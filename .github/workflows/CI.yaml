name: CI Build & Push

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'k8s/'
      - 'setup/'
      - '*.md'

permissions:
  contents: write

jobs:
  
  build-push:   
    runs-on: ubuntu-latest
    steps:

      - name: Code Checkout
        uses: actions/checkout@v7

      - name: docker login
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Shorten github sha
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Set up docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USER }}/wisecow:latest
            ${{ vars.DOCKERHUB_USER }}/wisecow:${{ env.SHORT_SHA }}
  update-manifest:
    runs-on: ubuntu-latest
    needs: build-push
    steps:
      
      - name: Code Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 1
      
      - name: Shorten github sha
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Update kubernetes app deployment manifest
        run: |
          sed -i "s|image: ${{ vars.DOCKERHUB_USER }}/wisecow:.*|image: ${{ vars.DOCKERHUB_USER }}/wisecow:${{ env.SHORT_SHA }}|" k8s/10-app.yaml


      - name: Commit updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/10-app.yaml
          git diff --staged --quiet || git commit -m "ci: update bankapp image to ${{ env.SHORT_SHA }} [skip ci]"
          git push